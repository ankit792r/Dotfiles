[general]
import = [
  "./mocha.toml"
]

[font]
size = 14

[font.normal]
family = "Iosevka Nerd Font"
style = "Regular"

[font.bold]
family = "Iosevka Nerd Font"
style = "Bold"

[font.italic]
family = "Iosevka Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Iosevka Nerd Font"
style = "Bold Italic"



[window]
padding = { x = 8, y = 8 }
decorations = "None"
dynamic_padding = true
opacity = 0.80

[[keyboard.bindings]]
key = "Insert"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "Insert"
mods = "Shift"
action = "Paste"


[cursor]
style = { shape = "Block", blinking = "Off" }

[bell]
animation = "EaseOut"
