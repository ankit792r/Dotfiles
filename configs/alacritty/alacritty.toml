[general]
import = [
  # "./mocha.toml"
  "./moonfly.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 15

[font.normal]
family = "Iosevka Nerd Font"
style = "Regular"

[font.bold]
family = "Iosevka Nerd Font"
style = "Bold"

[font.italic]
family = "Iosevka Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Iosevka Nerd Font"
style = "Bold Italic"



[window]
padding = { x = 6, y = 6 }
decorations = "None"
dynamic_padding = true

[[keyboard.bindings]]
key = "Insert"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "Insert"
mods = "Shift"
action = "Paste"


[cursor]
style = { shape = "Block", blinking = "Off" }

[bell]
animation = "EaseOut"
